version: "3.9"

services:
  hub-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8010:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - git-mirrors:/data/repos
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - redis
      - postgres
      - qdrant
    volumes:
      - git-mirrors:/data/repos
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.worker.celery_app beat --loglevel=info

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant-data:/qdrant/storage
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secondbrain}
      POSTGRES_USER: ${POSTGRES_USER:-sbuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sbpass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sbuser}"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "3010:3000"
    depends_on:
      - hub-api
    environment:
      HUB_API_URL: http://hub-api:8000
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3010/painel}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me}
      GITHUB_ID: ${GITHUB_APP_CLIENT_ID}
      GITHUB_SECRET: ${GITHUB_APP_CLIENT_SECRET}
    env_file: .env
    restart: unless-stopped

volumes:
  qdrant-data:
  postgres-data:
  git-mirrors:
