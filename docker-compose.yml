version: "3.9"

services:
  hub-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8010:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - git-mirrors:/data/repos
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
      - qdrant
    volumes:
      - git-mirrors:/data/repos
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis
    command: celery -A app.worker.celery_app beat --loglevel=info

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secondbrain}
      POSTGRES_USER: ${POSTGRES_USER:-sbuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sbpass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sbuser}"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  qdrant-data:
  postgres-data:
  git-mirrors:
